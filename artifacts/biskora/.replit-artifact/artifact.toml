kind = "web"
previewPath = "/"
title = "Biskora Cookies"
version = "1.0.0"
id = "artifacts/biskora"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25203

[services.development]
run = "pnpm --filter @workspace/biskora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biskora", "run", "build" ]
serve = "static"
publicDir = "artifacts/biskora/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25203"
BASE_PATH = "/"
